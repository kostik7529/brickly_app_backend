# ====================== Общие настройки ======================
spring:
  profiles:
    active: local

  liquibase:
    enabled: true
    change-log: classpath:db.changelog/db.changelog-master.xml

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    show-sql: true

  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

  # ====================== Настройки загрузки файлов ======================
  servlet:
    multipart:
      enabled: true
      max-file-size: 12MB
      max-request-size: 55MB
      file-size-threshold: 2KB
      resolve-lazily: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationSorter: method

app:
  upload:
    base-dir: uploads

gpt:
  api:
    key: ${GPT_API_KEY}
    url: http://104.128.139.152:8888/v1/chat/completions
    timeout: 10000
    model: gpt-5-nano
    temperature: 0.3

yookassa:
  shop-id: your_shop_id
  secret-key: your_secret_key
  url: https://api.yookassa.ru/v3

# ====================== Профиль LOCAL ======================
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# ====================== Профиль DOCKER ======================
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/bricklydb
    username: bricklyuser
    password: bricklypass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  app:
    upload:
      base-dir: /app/uploads